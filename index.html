<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #1a202c;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #5a67d8;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #718096;
    }

    .stats .count {
      font-weight: 600;
      color: #4a5568;
    }

    .btn-clear-done {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-clear-done:hover {
      background: #fff5f5;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .list-item.done {
      background: #f7fafc;
      border-color: #e2e8f0;
      opacity: 0.7;
    }

    .list-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
      transition: color 0.2s;
    }

    .list-item.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .empty .empty-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="100">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span class="count" id="statsText">아이템 없음</span>
      <button class="btn-clear-done" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="empty" id="empty">
      <span class="empty-icon">🧺</span>
      리스트가 비어 있어요.<br>위에서 아이템을 추가해 보세요!
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nuylcyblzbnilbqqnext.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWxjeWJsemJuaWxicXFuZXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDI5MTUsImV4cCI6MjA5MTk3ODkxNX0.XUuYEwaApFdy5OIqk8dZvVweX6waQ_a98J4ORVTauRU';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const statsText = document.getElementById('statsText');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        statsText.textContent = '아이템 없음';
        return;
      }

      empty.style.display = 'none';

      const total = items.length;
      const done = items.filter(i => i.done).length;
      statsText.textContent = `${total}개 중 ${done}개 완료`;

      items.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'list-item' + (item.done ? ' done' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.done;
        checkbox.addEventListener('change', () => toggle(item.id, !item.done));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-delete';
        delBtn.textContent = '×';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => remove(item.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await sb
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const { error } = await sb
        .from('shopping_items')
        .insert({ text, done: false });
      if (error) { console.error(error); return; }

      input.value = '';
      input.focus();
      await loadItems();
    }

    async function toggle(id, done) {
      const { error } = await sb
        .from('shopping_items')
        .update({ done })
        .eq('id', id);
      if (error) { console.error(error); return; }
      await loadItems();
    }

    async function remove(id) {
      const { error } = await sb
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { console.error(error); return; }
      await loadItems();
    }

    async function clearDone() {
      const { error } = await sb
        .from('shopping_items')
        .delete()
        .eq('done', true);
      if (error) { console.error(error); return; }
      await loadItems();
    }

    document.getElementById('itemInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addItem(); }
    });

    loadItems();
  </script>
</body>
</html>
